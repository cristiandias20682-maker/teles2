<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SISTEMA DE CANALES - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-color: #0d1117;
            --panel-bg: #161b22;
            --text-color: #ffffff;
            --accent-green: #2ea043;
            --tag-red: #da3633;
            --border-color: #30363d;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            height: 100vh;
            box-sizing: border-box;
        }

        /* Encabezado */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 20px;
        }

        .header h1 {
            margin: 0;
            font-size: 20px;
            font-weight: 600;
        }

        .header .time-date {
            text-align: right;
            font-size: 14px;
            color: #8b949e;
        }

        /* Contenedor Principal */
        .main-container {
            display: grid;
            grid-template-columns: 1fr 300px; /* Sección izquierda y reproductor */
            gap: 20px;
            flex-grow: 1;
        }

        /* Sección Izquierda: Exclusivos y Nacionales */
        .left-section {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .section-title {
            font-size: 14px;
            font-weight: 600;
            color: #8b949e;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        /* Cuadros de Señales Exclusivas */
        .exclusivas-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        /* Cuadros de Canales Nacionales */
        .nacionales-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }

        /* Estilo general de los cuadros (Cards) */
        .channel-card {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 15px;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 80px; /* Altura fija para uniformidad */
        }

        .channel-card:hover {
            border-color: #8b949e;
        }

        .channel-card.active {
            border-color: var(--accent-green);
            box-shadow: 0 0 10px rgba(46, 160, 67, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 5px;
        }

        .tag {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            text-transform: uppercase;
        }

        .tag-web {
            background-color: var(--tag-red);
            color: white;
        }

        .tag-live {
            background-color: var(--accent-green);
            color: white;
        }

        .channel-name {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
        }

        .channel-subtext {
            font-size: 11px;
            color: #8b949e;
        }

        /* Sección del Reproductor (Derecha) */
        .player-section {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .video-wrapper {
            width: 300px;
            height: 169px; /* Proporción 16:9 */
            background-color: black;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        /* Controles de navegación */
        .nav-controls {
            display: flex;
            gap: 10px;
            margin-top: auto; /* Empuja hacia abajo */
        }

        .nav-btn {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            color: var(--text-color);
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }

        .nav-btn:hover {
            background-color: #21262d;
        }

        /* Dock de aplicaciones inferior */
        .app-dock {
            display: flex;
            justify-content: center;
            gap: 15px;
            padding: 10px;
            background-color: rgba(22, 27, 34, 0.8);
            border-radius: 12px;
            margin-top: 20px;
            width: fit-content;
            margin-left: auto;
            margin-right: auto;
        }

        .app-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background-size: cover;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>SISTEMA DE CANALES - CRISTIAN DIAS</h1>
        <div class="time-date">
            <div id="reloj">7:07 AM</div>
            <div id="fecha">Wed, Jun 17, 2026</div>
        </div>
    </div>

    <div class="main-container">
        <div class="left-section">
            
            <div>
                <div class="section-title">🏆 SEÑALES EXCLUSIVAS (MUNDIAL)</div>
                <div class="exclusivas-grid">
                    <div class="channel-card" onclick="location.href='https://www.televicentro.com';">
                        <div class="card-header"><span class="tag tag-web">WEB</span></div>
                        <div>
                            <div class="channel-subtext">TELEVICENTRO</div>
                            <div class="channel-name">Ver CANAL 5 (Oficial)</div>
                        </div>
                    </div>
                    <div class="channel-card" onclick="location.href='https://www.deportestvc.com';">
                        <div class="card-header"><span class="tag tag-web">WEB</span></div>
                        <div>
                            <div class="channel-subtext">DEPORTES TVC</div>
                            <div class="channel-name">Ver DEPORTES TVC</div>
                        </div>
                    </div>
                </div>
            </div>

            <div>
                <div class="section-title">🌐 CANALES NACIONALES</div>
                <div class="nacionales-grid" id="grid-nacionales">
                    </div>
            </div>

            <div class="nav-controls">
                <button class="nav-btn">◀ IZQ</button>
                <button class="nav-btn">DER ▶</button>
            </div>
        </div>

        <div class="player-section">
            <div class="video-wrapper">
                <video id="reproductor" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="300" height="169"></video>
            </div>
        </div>
    </div>

    <div class="app-dock">
        <div class="app-icon" style="background-color: #ff0000; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">YT</div>
        <div class="app-icon" style="background-color: #e50914; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">NF</div>
        <div class="app-icon" style="background-color: #00a8e1; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold;">AP</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        // Inicializar Video.js
        var player = videojs('reproductor', {
            autoplay: true,
            muted: false,
            fluid: false
        });

        // Reloj y Fecha (Simulado para coincidir con la foto)
        function actualizarReloj() {
            // En producción, usar new Date()
            document.getElementById('reloj').innerText = "7:07 AM";
            document.getElementById('fecha').innerText = "Wed, Jun 17, 2026";
        }
        actualizarReloj(); // Ejecutar una vez

        // Lista de canales nacionales (Datos de ejemplo basados en la foto)
        const canalesNacionales = [
            { name: "A+ [Geo-blocked]", sub: "A+ (000-SL)", url: "URL_DEL_STREAM_1", live: true },
            { name: "Alsacias Televisión (ATV)", sub: "ALSACIAS T", url: "URL_DEL_STREAM_2", live: true, active: true }, // Canal activo por defecto
            { name: "Canal 11 (1080p)", sub: "CANAL 11 [", url: "URL_DEL_STREAM_3", live: true },
            { name: "Choluteca TV (1080p)", sub: "CHOLUTECA", url: "URL_DEL_STREAM_4", live: true },
            { name: "CHTV (1080p)", sub: "CHTV (1080)", url: "URL_DEL_STREAM_5", live: true },
            { name: "Dios Te Ve (720p)", sub: "DIOS TE VE", url: "URL_DEL_STREAM_6", live: true }
        ];

        // Generar la grilla de canales nacionales
        const gridNacionales = document.getElementById('grid-nacionales');

        canalesNacionales.forEach(canal => {
            const card = document.createElement('div');
            card.className = `channel-card ${canal.active ? 'active' : ''}`;
            
            let tagHTML = '';
            if (canal.live) {
                tagHTML = '<div class="card-header"><span class="tag tag-live">LIVE</span></div>';
            }

            card.innerHTML = `
                ${tagHTML}
                <div>
                    <div class="channel-subtext">${canal.sub}</div>
                    <div class="channel-name">${canal.name}</div>
                </div>
            `;

            card.onclick = function() {
                // Cambiar clase activa
                document.querySelectorAll('.nacionales-grid .channel-card').forEach(c => c.classList.remove('active'));
                card.classList.add('active');
                
                // Cargar stream en el reproductor
                if (canal.url !== "URL_DEL_STREAM_X") {
                    player.src({ type: 'application/x-mpegURL', src: canal.url });
                    player.play();
                } else {
                    alert("Añade una URL de stream válida para este canal.");
                }
            };

            gridNacionales.appendChild(card);
        });
    </script>
</body>
</html>
