<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV CRISTIAN DIAS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        /* Estilos unidos en un solo archivo */
        body { display: flex; background: #0f0f0f; color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 200px; background: #1a1a1a; height: 100vh; padding: 20px; border-right: 1px solid #333; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .video-box { width: 100%; max-width: 800px; background: #000; border-radius: 12px; margin-bottom: 20px; aspect-ratio: 16/9; }
        video { width: 100%; height: 100%; border-radius: 12px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; }
        .canal-card { background: #2a2a2a; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; transition: 0.3s; border: 2px solid transparent; }
        .canal-card:hover { border: 2px solid #007bff; background: #333; }
        .logo { font-weight: bold; margin-bottom: 40px; color: #007bff; font-size: 1.2rem; }
        h1 { margin-top: 0; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">SISTEMA TV<br>CRISTIAN DIAS</div>
        <p>Inicio</p>
        <p>Buscar</p>
        <p>Biblioteca</p>
    </nav>
    
    <main class="content">
        <h1>Mi TV Honduras</h1>
        <div class="video-box">
            <video id="video" controls autoplay></video>
        </div>
        <div class="grid" id="lista">Cargando canales...</div>
    </main>

    <script>
        const video = document.getElementById('video');
        const lista = document.getElementById('lista');
        const hls = new Hls();

        // Esta lista consulta los canales automáticamente para que no tengas que editarlos
        const playlistUrl = 'https://iptv-org.github.io/iptv/countries/hn.m3u';

        async function cargarCanales() {
            const respuesta = await fetch(playlistUrl);
            const data = await respuesta.text();
            const lineas = data.split('\n');
            lista.innerHTML = '';

            lineas.forEach((linea, index) => {
                if (linea.startsWith('#EXTINF')) {
                    const nombre = linea.split(',')[1];
                    const url = lineas[index + 1];
                    
                    const btn = document.createElement('div');
                    btn.className = 'canal-card';
                    btn.innerText = nombre;
                    btn.onclick = () => {
                        if(Hls.isSupported()) {
                            hls.loadSource(url);
                            hls.attachMedia(video);
                            video.play();
                        }
                    };
                    lista.appendChild(btn);
                }
            });
        }
        cargarCanales();
    </script>
</body>
</html>
