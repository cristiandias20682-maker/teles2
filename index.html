<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <style>
        :root { --glass: rgba(20, 20, 20, 0.85); --accent: #00ff9d; }
        body { background: #05070a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        
        /* Layout */
        .header { font-size: 24px; font-weight: bold; color: var(--accent); margin-bottom: 20px; }
        .main { display: grid; grid-template-columns: 300px 1fr; gap: 20px; flex-grow: 1; }
        .video-box { border: 2px solid var(--accent); display: flex; align-items: center; justify-content: center; overflow: hidden; }
        
        /* Controles */
        .nav-arrows { display: flex; gap: 15px; margin-top: 20px; }
        .arrow-btn { background: rgba(255,255,255,0.1); border: 1px solid white; color: white; padding: 10px 25px; border-radius: 8px; cursor: pointer; font-size: 18px; }
        
        /* Lista inferior */
        .shelf { display: flex; gap: 10px; overflow-x: auto; padding: 15px; margin-top: 15px; }
        .chan { min-width: 120px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; text-align: center; font-size: 11px; cursor: pointer; }
        
        /* Dock */
        .dock { display: flex; justify-content: center; gap: 40px; padding: 15px; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">⚡ SISTEMA TV - CRISTIAN DIAS</div>

    <div class="main">
        <div class="glass" style="padding:20px;">
            <h3 style="color:var(--accent)">🏆 SEÑALES</h3>
            <div class="nav-arrows">
                <button class="arrow-btn">◀</button>
                <button class="arrow-btn">▶</button>
            </div>
        </div>
        <div class="glass video-box">
            <video id="player" controls style="width:100%; height:100%"></video>
        </div>
    </div>

    <div class="glass shelf" id="shelf"></div>

    <div class="glass dock">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" width="35">
        <img src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" width="35">
    </div>

    <script>
        const blockList = ["Alfa", "Aviva", "Campus", "Girasol", "32 STO", "Cholusat", "Talanga"];
        async function load() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const shelf = document.getElementById('shelf');
            data.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = arr[i + 1];
                    if (!blockList.some(b => name.includes(b))) {
                        const div = document.createElement('div');
                        div.className = 'chan';
                        div.innerText = name.substring(0, 15);
                        div.onclick = () => { document.getElementById('player').src = url; document.getElementById('player').play(); };
                        shelf.appendChild(div);
                    }
                }
            });
        }
        load();
    </script>
</body>
</html>
