<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE CANALES - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-body: #05070a;
            --panel: rgba(26, 30, 38, 0.4);
            --accent: #00ff9d;
            --white: #ffffff;
            --glass-blur: blur(15px);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
        }

        body { background: var(--bg-body); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 30px; height: 100vh; display: flex; flex-direction: column; box-sizing: border-box; overflow: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .marca-tv { font-size: 22px; font-weight: 800; text-transform: uppercase; }
        .reloj-tv { font-size: 16px; color: #888; font-weight: bold; }

        .layout-tv { display: grid; grid-template-columns: 350px 1fr; gap: 25px; flex-grow: 1; }

        .seccion-exclusivas { display: flex; flex-direction: column; gap: 15px; }
        .titulo-seccion { color: var(--accent); font-size: 14px; font-weight: 700; margin-bottom: 5px; text-transform: uppercase; }
        
        .vidrio-liquid { background: var(--panel); backdrop-filter: var(--glass-blur); border: var(--glass-border); border-radius: 15px; padding: 20px; cursor: pointer; transition: 0.15s; }
        .vidrio-liquid:hover { border-color: rgba(0, 255, 157, 0.5); transform: scale(1.02); }

        .contenedor-reproductor { background: #000; border-radius: 20px; border: 2px solid var(--accent); height: 100%; width: 100%; overflow: hidden; position: relative; }
        .video-js { width: 100% !important; height: 100% !important; }

        .controles-nav { display: flex; gap: 10px; margin-top: 15px; }
        .btn-nav { background: rgba(255,255,255,0.1); border: 1px solid #444; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .btn-nav:hover { background: var(--accent); color: black; }

        .layout-inferior { margin-top: 25px; }
        .carrusel-nacionales { display: flex; gap: 15px; overflow-x: hidden; padding: 5px 0; scroll-behavior: smooth; }
        .card-canal { min-width: 180px; height: 90px; flex-shrink: 0; display: flex; flex-direction: column; justify-content: flex-end; font-size: 13px; color: #ccc; }
        .card-canal.seleccionado { border: 2px solid var(--accent); color: var(--white); }
        .tag-live { color: #ff4b4b; font-size: 8px; font-weight: 800; margin-bottom: 3px; }

        .dock-apps { display: flex; justify-content: center; gap: 15px; margin-top: 25px; }
        .icono-app { width: 45px; height: 45px; display: flex; align-items: center; justify-content: center; background: rgba(255, 255, 255, 0.05); border: var(--glass-border); border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <div class="marca-tv">SISTEMA DE CANALES - CRISTIAN DIAS</div>
        <div id="reloj" class="reloj-tv">00:00:00</div>
    </header>

    <div class="layout-tv">
        <div class="seccion-exclusivas">
            <div class="titulo-seccion">🏆 SEÑALES EXCLUSIVAS (MUNDIAL)</div>
            <div class="vidrio-liquid" onclick="window.open('https://www.televicentro.com', '_blank')">Ver CANAL 5 (Oficial)</div>
            <div class="vidrio-liquid" onclick="window.open('https://www.deportestvc.com', '_blank')">Ver DEPORTES TVC</div>
            
            <div class="controles-nav">
                <button class="btn-nav" onclick="desplazar(-400)">◀ IZQ</button>
                <button class="btn-nav" onclick="desplazar(400)">DER ▶</button>
            </div>
        </div>

        <div class="contenedor-reproductor">
            <video id="reproductor" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto"></video>
        </div>
    </div>

    <div class="layout-inferior">
        <div class="titulo-seccion">🌐 CANALES NACIONALES</div>
        <div class="carrusel-nacionales" id="lista-canales"></div>
    </div>

    <div class="dock-apps">
        <div class="icono-app">YT</div>
        <div class="icono-app">NF</div>
        <div class="icono-app">AP</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor', { autoplay: true });
        
        function desplazar(cant) { document.getElementById('lista-canales').scrollBy({ left: cant, behavior: 'smooth' }); }
        
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);

        async function cargar() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const container = document.getElementById('lista-canales');
            const lines = data.split('\n');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i + 1];
                    if (name && url) {
                        const div = document.createElement('div');
                        div.className = 'vidrio-liquid card-canal';
                        div.innerHTML = `<span class="tag-live">LIVE</span><div>${name.substring(0, 20)}</div>`;
                        div.onclick = () => {
                            player.src({src: url, type: 'application/x-mpegURL'});
                            player.play();
                            document.querySelectorAll('.card-canal').forEach(c => c.classList.remove('seleccionado'));
                            div.classList.add('seleccionado');
                        };
                        container.appendChild(div);
                    }
                }
            }
        }
        cargar();
    </script>
</body>
</html>
