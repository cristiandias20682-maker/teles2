<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { 
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.15);
            --accent: #00ff9d;
        }
        body { background: #05070a; color: #fff; font-family: sans-serif; margin: 0; padding: 25px; overflow: hidden; }

        .layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        
        /* Efecto Liquid Glass */
        .glass { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border: 1px solid var(--glass-border); border-radius: 20px;
        }

        .video-container { background: #000; border: 2px solid var(--accent); height: 420px; border-radius: 25px; box-shadow: 0 0 30px rgba(0,255,157,0.2); }
        
        .card { padding: 15px; margin-bottom: 10px; cursor: pointer; transition: 0.3s; }
        .card:hover { border-color: var(--accent); transform: scale(1.02); }
        .active { border: 2px solid var(--accent); }

        .carousel { display: flex; gap: 15px; margin-top: 30px; overflow-x: auto; padding: 10px; }
        .canal-item { min-width: 190px; height: 100px; display: flex; flex-direction: column; justify-content: flex-end; }
        
        .live-tag { color: #ff4b4b; font-size: 9px; font-weight: 800; }
    </style>
</head>
<body>

    <header style="display:flex; justify-content:space-between; margin-bottom:20px;">
        <div style="font-size: 22px; font-weight: bold;">SISTEMA DE CANALES - CRISTIAN DIAS</div>
        <div id="reloj" style="color:#888;">00:00:00</div>
    </header>

    <div class="layout">
        <div class="panel-izq">
            <div style="color:var(--accent); margin-bottom:10px;">🏆 SEÑALES EXCLUSIVAS</div>
            <div class="glass card" onclick="window.open('https://www.televicentro.com','_blank')">Canal 5 (Oficial)</div>
            <div class="glass card" onclick="window.open('https://www.deportestvc.com','_blank')">Deportes TVC</div>
        </div>
        <div class="video-container glass" id="reproductor-box">
            <video id="player" class="video-js vjs-default-skin" controls width="100%" height="420px"></video>
        </div>
    </div>

    <div style="color:var(--accent); margin-top:30px;">🌐 CANALES NACIONALES</div>
    <div class="carousel" id="lista-canales"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('player', { autoplay: true });
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);

        async function cargar() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const container = document.getElementById('lista-canales');
            const lines = data.split('\n');

            for(let i=0; i<lines.length; i++) {
                if(lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    if(name && url) {
                        const div = document.createElement('div');
                        div.className = 'glass card canal-item';
                        div.innerHTML = `<span class="live-tag">LIVE</span><div>${name}</div>`;
                        div.onclick = () => {
                            player.src({src: url, type: 'application/x-mpegURL'});
                            player.play();
                            document.querySelectorAll('.canal-item').forEach(c => c.classList.remove('active'));
                            div.classList.add('active');
                        };
                        container.appendChild(div);
                    }
                }
            }
        }
        cargar();
    </script>
</body>
</html>
