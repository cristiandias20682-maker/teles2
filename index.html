<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Liquid IPTV - CAST</title>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        /* ... TUS ESTILOS EXISTENTES SE MANTIENEN ... */
        /* AGREGAMOS ESTILO PARA EL BOTÓN DE CAST */
        .cast-container {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 9999;
            background: rgba(0,0,0,0.5);
            border-radius: 50%;
            padding: 5px;
        }
        google-cast-launcher {
            width: 40px;
            height: 40px;
            display: block;
            cursor: pointer;
        }
        /* ... RESTO DE TU CSS ... */
    </style>
</head>
<body>

    <div id="contenedor-reproductor" style="position: relative;">
        <div class="cast-container">
            <google-cast-launcher></google-cast-launcher>
        </div>
        <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%"></video>
    </div>

    <script>
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                cast.framework.CastContext.getInstance().setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });
            }
        };
    </script>
    </body>
</html>
