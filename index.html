<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-body: #05070a;
            --glass: rgba(255, 255, 255, 0.07);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --accent: #00ff9d;
            --white: #ffffff;
        }

        body {
            background: var(--bg-body);
            color: var(--white);
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 30px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .layout-tv { display: grid; grid-template-columns: 350px 1fr; gap: 25px; flex-grow: 1; }

        /* Efecto Liquid Glass */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            border-radius: 20px;
            padding: 20px;
        }

        .titulo-seccion { color: var(--accent); font-size: 14px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }

        .btn-card {
            background: var(--glass);
            border: var(--glass-border);
            border-radius: 12px;
            padding: 15px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: 0.3s;
            color: var(--white);
        }
        .btn-card:hover { background: rgba(0, 255, 157, 0.1); border-color: var(--accent); }

        .nav-btn-container { display: flex; gap: 10px; margin-top: 15px; }
        .nav-btn {
            background: var(--glass);
            border: var(--glass-border);
            color: var(--white);
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }

        .contenedor-reproductor {
            background: #000;
            border-radius: 20px;
            border: 2px solid var(--accent);
            height: 100%;
            overflow: hidden;
        }

        .carrusel-nacionales { display: flex; gap: 15px; overflow-x: auto; padding: 10px 0; scroll-behavior: smooth; }
        .card-canal {
            min-width: 180px;
            height: 90px;
            background: var(--glass);
            border: var(--glass-border);
            border-radius: 15px;
            padding: 10px;
            cursor: pointer;
        }

        /* Dock Apps */
        .dock-apps { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        .icono-app {
            background: var(--glass);
            border: var(--glass-border);
            padding: 10px 25px;
            border-radius: 15px;
            color: var(--white);
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-size: 22px; font-weight: 800;">SISTEMA DE CANALES - CRISTIAN DIAS</div>
        <div id="reloj" style="color: #888;">00:00:00</div>
    </header>

    <div class="layout-tv">
        <div class="glass-panel">
            <div class="titulo-seccion">🏆 SEÑALES EXCLUSIVAS</div>
            <div class="btn-card" onclick="window.open('https://www.televicentro.com')">Canal 5 (Oficial)</div>
            <div class="btn-card" onclick="window.open('https://www.deportestvc.com')">Deportes TVC</div>
            
            <div class="nav-btn-container">
                <button class="nav-btn" onclick="desplazar(-400)">◀ IZQ</button>
                <button class="nav-btn" onclick="desplazar(400)">DER ▶</button>
            </div>
        </div>

        <div class="contenedor-reproductor">
            <video id="reproductor" class="video-js vjs-default-skin" controls width="100%" height="100%"></video>
        </div>
    </div>

    <div class="glass-panel" style="margin-top: 25px;">
        <div class="titulo-seccion">🌐 CANALES NACIONALES (TOTAL: 100+)</div>
        <div class="carrusel-nacionales" id="lista-canales"></div>
    </div>

    <div class="dock-apps">
        <div class="icono-app">YT</div>
        <div class="icono-app">NF</div>
        <div class="icono-app">PRIME</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor', { autoplay: true });
        
        function desplazar(cant) { document.getElementById('lista-canales').scrollBy({ left: cant, behavior: 'smooth' }); }
        
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);

        async function cargar() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const container = document.getElementById('lista-canales');
            const lines = data.split('\n');

            for (let i = 0; i < lines.length; i++) {
                if (lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i + 1];
                    if (name && url) {
                        const div = document.createElement('div');
                        div.className = 'card-canal';
                        div.innerHTML = `<span style="color:red; font-size:8px; font-weight:bold;">LIVE</span><div style="font-size:12px;">${name.substring(0, 20)}</div>`;
                        div.onclick = () => {
                            player.src({src: url, type: 'application/x-mpegURL'});
                            player.play();
                        };
                        container.appendChild(div);
                    }
                }
            }
        }
        cargar();
    </script>
</body>
</html>
