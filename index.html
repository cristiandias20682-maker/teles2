<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #05070a; color: white; font-family: sans-serif; margin: 0; padding: 20px; }
        .glass { background: rgba(20, 20, 20, 0.85); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; }
        .grid { display: grid; grid-template-columns: 250px 1fr; gap: 20px; }
        .controls { display: flex; gap: 15px; margin-top: 15px; }
        .btn { padding: 15px 30px; border-radius: 10px; border: 1px solid white; background: transparent; color: white; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="color:#00ff9d">⚡ SISTEMA TV - CRISTIAN DIAS</h1>

    <div class="grid">
        <div class="glass" style="padding:20px;">
            <h3>🏆 CANALES EN VIVO</h3>
            <div class="controls">
                <button class="btn" onclick="nav(-1)">◀</button>
                <button class="btn" onclick="nav(1)">▶</button>
            </div>
            <p id="status">Cargando lista...</p>
        </div>
        <div class="glass" style="padding:5px;">
            <video id="player" controls style="width:100%; height:auto; border-radius:15px;"></video>
        </div>
    </div>

    <script>
        let list = []; let idx = 0;
        const block = ["Alfa", "Aviva", "Campus", "Girasol", "32 STO", "Cholusat", "Talanga"];

        async function init() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            data.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = arr[i + 1];
                    if (!block.some(b => name.includes(b))) list.push({name, url});
                }
            });
            document.getElementById('status').innerText = "Canales listos: " + list.length;
        }

        function nav(d) {
            idx = (idx + d + list.length) % list.length;
            const player = document.getElementById('player');
            player.src = list[idx].url;
            player.play();
            document.getElementById('status').innerText = "Reproduciendo: " + list[idx].name;
        }
        init();
    </script>
</body>
</html>
