<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-body: #05070a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --accent: #00ff9d;
            --white: #ffffff;
        }

        body { background: var(--bg-body); color: var(--white); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        
        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; flex-grow: 1; }

        .glass-panel { background: var(--glass); backdrop-filter: blur(15px); border: var(--glass-border); border-radius: 20px; padding: 20px; }

        .titulo-seccion { color: var(--accent); font-size: 13px; font-weight: 700; margin-bottom: 15px; text-transform: uppercase; }

        .btn-card { background: var(--glass); border: var(--glass-border); border-radius: 12px; padding: 12px; margin-bottom: 10px; cursor: pointer; color: white; transition: 0.3s; }
        .btn-card:hover { background: var(--accent); color: black; }

        .nav-btn { background: var(--glass); border: var(--glass-border); color: white; padding: 8px 15px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        
        .video-container { background: black; border-radius: 20px; border: 2px solid var(--accent); overflow: hidden; display: flex; }
        .video-js { width: 100% !important; height: 100% !important; }

        .bottom-shelf { display: flex; gap: 15px; overflow-x: auto; padding: 10px; margin-top: 15px; background: var(--glass); border-radius: 20px; }
        .canal-card { min-width: 160px; height: 80px; background: rgba(0,0,0,0.3); border: var(--glass-border); border-radius: 12px; padding: 10px; cursor: pointer; font-size: 11px; }

        .dock { display: flex; justify-content: center; gap: 20px; margin-top: 15px; background: var(--glass); padding: 15px; border-radius: 30px; border: var(--glass-border); backdrop-filter: blur(20px); width: fit-content; margin: 15px auto 0 auto; }
        .app-icon { padding: 10px 20px; color: white; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-size: 20px; font-weight: 800;">SISTEMA DE CANALES - CRISTIAN DIAS</div>
        <div id="reloj" style="color: #888;">00:00:00</div>
    </header>

    <div class="main-layout">
        <div class="glass-panel">
            <div class="titulo-seccion">🏆 SEÑALES EXCLUSIVAS</div>
            <div class="btn-card" onclick="window.open('https://www.televicentro.com')">Canal 5 (Oficial)</div>
            <div class="btn-card" onclick="window.open('https://www.deportestvc.com')">Deportes TVC</div>
            <div style="display: flex; gap: 10px;">
                <button class="nav-btn" onclick="document.getElementById('lista-canales').scrollBy({left:-400, behavior:'smooth'})">◀ IZQ</button>
                <button class="nav-btn" onclick="document.getElementById('lista-canales').scrollBy({left:400, behavior:'smooth'})">DER ▶</button>
            </div>
        </div>
        <div class="video-container">
            <video id="reproductor" class="video-js vjs-default-skin vjs-big-play-centered" controls></video>
        </div>
    </div>

    <div class="bottom-shelf" id="lista-canales"></div>

    <div class="dock">
        <div class="app-icon">YT</div>
        <div class="app-icon">NF</div>
        <div class="app-icon">PRIME</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor', { autoplay: true });
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);

        async function cargar() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const container = document.getElementById('lista-canales');
            const lines = data.split('\n');
            lines.forEach((line, i) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = lines[i + 1];
                    const div = document.createElement('div');
                    div.className = 'canal-card';
                    div.innerHTML = `<span style="color:red; font-size:8px;">LIVE</span><br>${name.substring(0, 18)}`;
                    div.onclick = () => { player.src({src: url, type: 'application/x-mpegURL'}); player.play(); };
                    container.appendChild(div);
                }
            });
        }
        cargar();
    </script>
</body>
</html>
