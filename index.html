<!DOCTYPE html>
<html lang="es">
<head>
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --accent: #00ff9d;
        }

        /* Efecto Liquid Glass Global */
        .liquid-glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: var(--glass-border);
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; flex-grow: 1; }
        
        .video-box { background: black; border: 2px solid var(--accent); overflow: hidden; display: flex; }
        
        .btn-side { width: 60px; height: 35px; border-radius: 8px; border: var(--glass-border); background: rgba(255,255,255,0.1); cursor: pointer; color: white; font-weight: bold; }
        
        .shelf { display: flex; gap: 15px; overflow-x: auto; padding: 15px; margin-top: 15px; }
        .channel-card { min-width: 160px; height: 80px; flex-shrink: 0; padding: 10px; cursor: pointer; border: var(--glass-border); border-radius: 12px; background: rgba(0,0,0,0.3); }

        .dock { display: flex; justify-content: center; gap: 40px; margin-top: 15px; padding: 15px 40px; }
        .app-icon { width: 50px; height: 50px; cursor: pointer; transition: 0.3s; }
        .app-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="liquid-glass" style="padding: 20px;">
            <h3 style="color:var(--accent)">🏆 SEÑALES EXCLUSIVAS</h3>
            <div class="channel-card" style="margin-bottom:10px" onclick="window.open('https://www.televicentro.com')">Canal 5 (Oficial)</div>
            <div class="channel-card" style="margin-bottom:10px" onclick="window.open('https://www.deportestvc.com')">Deportes TVC</div>
            <div style="display: flex; gap: 10px;">
                <button onclick="document.getElementById('shelf').scrollBy(-300,0)" class="btn-side">◀ IZQ</button>
                <button onclick="document.getElementById('shelf').scrollBy(300,0)" class="btn-side">DER ▶</button>
            </div>
        </div>
        
        <div class="video-box liquid-glass">
            <video id="reproductor" class="video-js" controls width="100%"></video>
        </div>
    </div>

    <div id="shelf" class="shelf liquid-glass"></div>

    <div class="dock liquid-glass">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" onclick="window.open('https://youtube.com')">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" onclick="window.open('https://netflix.com')">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/1/11/Amazon_Prime_Video_logo.svg" onclick="window.open('https://primevideo.com')">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" onclick="window.open('https://disneyplus.com')">
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        // Carga dinámica de 100+ canales
        async function loadChannels() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const shelf = document.getElementById('shelf');
            data.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = arr[i + 1];
                    const div = document.createElement('div');
                    div.className = 'channel-card';
                    div.innerHTML = `<span style="color:red; font-size:9px;">LIVE</span><br>${name.substring(0, 18)}`;
                    div.onclick = () => { player.src({src: url, type: 'application/x-mpegURL'}); };
                    shelf.appendChild(div);
                }
            });
        }
        loadChannels();
        const player = videojs('reproductor');
    </script>
</body>
</html>
