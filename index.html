<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA PREMIUM - CRISTIAN</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        body { background: #0a0a0a; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; }
        .hero { padding: 50px 20px; text-align: center; background: linear-gradient(to bottom, #1a1a1a, #0a0a0a); }
        .grid-peliculas { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; padding: 40px; }
        .card-pelicula { background: #161616; border-radius: 15px; overflow: hidden; border: 1px solid #333; transition: 0.3s; cursor: pointer; }
        .card-pelicula:hover { transform: scale(1.03); border-color: #e50914; }
        .card-pelicula img { width: 100%; height: 400px; object-fit: cover; }
        .info { padding: 15px; }
        .btn-play { background: #e50914; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-weight: bold; width: 100%; }
        #reproductor-box { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1000; padding: 20px; }
    </style>
</head>
<body>

    <div class="hero">
        <h1>CINEMA PREMIUM</h1>
        <p>Tu selección exclusiva de Spider-Verse</p>
    </div>

    <div class="grid-peliculas">
        <div class="card-pelicula">
            <img src="https://image.tmdb.org/t/p/w500/iiZZSOXYsSXXj2h5J25W9p3zJpE.jpg" alt="Spider-Verse 1">
            <div class="info">
                <h3>Spider-Man: Into the Spider-Verse</h3>
                <button class="btn-play" onclick="cargarPelicula('URL_DEL_VIDEO_1')">REPRODUCIR AHORA</button>
            </div>
        </div>
        <div class="card-pelicula">
            <img src="https://image.tmdb.org/t/p/w500/8Vt6OOasEayM54pY2nNqL9L3P1Q.jpg" alt="Spider-Verse 2">
            <div class="info">
                <h3>Spider-Man: Across the Spider-Verse</h3>
                <button class="btn-play" onclick="cargarPelicula('URL_DEL_VIDEO_2')">REPRODUCIR AHORA</button>
            </div>
        </div>
    </div>

    <div id="reproductor-box">
        <button onclick="document.getElementById('reproductor-box').style.display='none'" style="margin-bottom: 10px;">CERRAR X</button>
        <video id="video-player" class="video-js vjs-big-play-centered" controls width="100%" height="80%"></video>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('video-player');
        function cargarPelicula(url) {
            document.getElementById('reproductor-box').style.display = 'block';
            player.src({src: url, type: 'video/mp4'});
            player.play();
        }
    </script>
</body>
</html>
