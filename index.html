<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Liquid IPTV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-gradiente: radial-gradient(circle at 50% 30%, #0a111e 0%, #05070b 100%);
            --liquid-bg: linear-gradient(135deg, rgba(25, 36, 56, 0.45) 0%, rgba(13, 19, 31, 0.7) 100%);
            --liquid-bg-hover: linear-gradient(135deg, rgba(35, 52, 82, 0.6) 0%, rgba(18, 27, 46, 0.85) 100%);
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.15);
            --neon-cyan: 0 0 20px rgba(0, 191, 255, 0.4);
            --neon-verde: 0 0 25px rgba(0, 255, 157, 0.6);
            --text-main: #f7fafc;
            --text-sub: #90cdf4;
        }

        body {
            background: var(--bg-gradiente);
            color: var(--text-main);
            font-family: 'Segoe UI', -apple-system, sans-serif;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        #control-vertical-tv {
            position: fixed;
            left: 15px;
            top: 50%;
            transform: translateY(-50%) translateZ(0);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10000;
            background: rgba(10, 15, 24, 0.6);
            padding: 8px;
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .btn-control-total {
            background: linear-gradient(180deg, rgba(30, 41, 59, 0.8) 0%, rgba(15, 23, 42, 0.9) 100%);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: white;
            font-size: 14px;
            width: 38px;
            height: 38px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.15s ease;
        }

        .btn-control-total:hover, .btn-control-total:focus {
            border-color: #00ff9d;
            box-shadow: var(--neon-verde);
            transform: scale(1.1);
            outline: none;
        }

        .contenido-principal {
            padding-left: 80px;
            padding-right: 20px;
            box-sizing: border-box;
            width: 100%;
        }

        #header-sistema { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            padding: 20px 0 5px 0; 
        }

        .titulo-marca {
            font-size: 20px;
            font-weight: 800;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ffffff, #90cdf4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin: 0;
        }

        #reloj-digital { font-size: 14px; color: var(--text-sub); font-weight: bold; }

        #buscador-canales {
            width: 100%;
            max-width: 300px;
            padding: 10px;
            margin: 10px 0;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: white;
            outline: none;
        }

        #contenedor-reproductor {
            width: 100%;
            max-width: 1100px;
            margin: 10px 0 20px 0;
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
        }

        .seccion-interfaz { padding: 10px 0; width: 100%; }

        .titulo-fila {
            font-size: 13px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 12px;
            color: #cbd5e0;
        }

        .grid-cuadros { display: flex; gap: 15px; width: 100%; overflow-x: auto; }
        .grid-cuadros::-webkit-scrollbar { display: none; }

        .wrapper-carrusel { position: relative; width: 100%; }

        .grid-carrusel-infinito {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            scroll-behavior: smooth;
            padding: 5px 0;
            width: 100%;
        }

        .card-canal {
            background: var(--liquid-bg);
            border-radius: 18px;
            padding: 15px;
            text-align: left;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            height: 75px;
            width: 190px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            box-shadow: var(--glass-shadow);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.2s ease;
        }

        .card-canal:hover, .card-canal:focus {
            background: var(--liquid-bg-hover);
            transform: scale(1.05);
            border-color: #00ff9d;
            box-shadow: var(--glass-shadow), var(--neon-cyan);
            outline: none;
        }

        .card-canal.activo { border-color: #00ff9d !important; background: linear-gradient(135deg, rgba(10, 48, 34, 0.75) 0%, rgba(5, 28, 20, 0.9) 100%) !important; }

        .canal-meta { font-size: 10px; color: var(--text-sub); font-weight: 700; text-transform: uppercase; margin-bottom: 3px; }
        .canal-titulo-texto { font-size: 13px; font-weight: 600; line-height: 1.3; }

        .tag-live-premium {
            position: absolute;
            top: 10px; right: 12px;
            background: #ff4b4b;
            color: #ffffff;
            font-size: 8px;
            font-weight: 800;
            padding: 2px 6px;
            border-radius: 5px;
        }

        .controles-tv-carrusel { display: flex; gap: 12px; margin-top: 10px; }

        .btn-tv-flecha {
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--text-main);
            font-size: 12px;
            padding: 6px 16px;
            border-radius: 10px;
            cursor: pointer;
        }

        #dock-apps {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(10, 15, 24, 0.9);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 10px 20px;
            border-radius: 25px;
            display: flex;
            gap: 15px;
            z-index: 9999;
        }

        .app-icono { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="control-vertical-tv">
        <button class="btn-control-total" onclick="navegarVertical('arriba')">▲</button>
        <button class="btn-control-total" onclick="navegarVertical('abajo')">▼</button>
    </div>

    <div class="contenido-principal">
        <div id="header-sistema">
            <h1 class="titulo-marca">SISTEMA DE CANALES DE CRISTIAN DIAS TROCHEZ</h1>
            <div id="reloj-digital">00:00:00</div>
        </div>

        <input type="text" id="buscador-canales" placeholder="🔍 Buscar canal..." onkeyup="filtrarCanales()">

        <div id="contenedor-reproductor">
            <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%"></video>
        </div>

        <div class="seccion-interfaz" id="sec-exclusivas">
            <div class="titulo-fila">🏆 SEÑALES EXCLUSIVAS (MUNDIAL)</div>
            <div class="grid-cuadros">
                <div class="card-canal" tabindex="0" onclick="window.open('https://www.televicentro.com', '_blank')">
                    <span class="tag-live-premium">WEB</span>
                    <div class="canal-meta">Televicentro</div>
                    <div class="canal-titulo-texto">Ver CANAL 5 (Oficial)</div>
                </div>
                <div class="card-canal" tabindex="0" onclick="window.open('https://www.deportestvc.com', '_blank')">
                    <span class="tag-live-premium">WEB</span>
                    <div class="canal-meta">Deportes TVC</div>
                    <div class="canal-titulo-texto">Ver DEPORTES TVC</div>
                </div>
            </div>
        </div>

        <div class="seccion-interfaz" id="sec-nacionales">
            <div class="titulo-fila">🌐 CANALES NACIONALES</div>
            <div class="wrapper-carrusel">
                <div class="grid-carrusel-infinito" id="contenedor-canales-dinamicos"></div>
                <div class="controles-tv-carrusel">
                    <button class="btn-tv-flecha" onclick="moverCarrusel('izquierda')">◀ IZQ</button>
                    <button class="btn-tv-flecha" onclick="moverCarrusel('derecha')">DER ▶</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor-tv', { fluid: true, autoplay: true, muted: false });

        player.ready(function() {
            this.volume(1.0);
            this.on('volumechange', function() { if(this.muted()) this.muted(false); if(this.volume() < 1.0) this.volume(1.0); });
        });

        function actualizarReloj() {
            const ahora = new Date();
            document.getElementById('reloj-digital').innerText = ahora.toLocaleTimeString();
        }
        setInterval(actualizarReloj, 1000);
        actualizarReloj();

        function filtrarCanales() {
            const filtro = document.getElementById('buscador-canales').value.toLowerCase();
            const tarjetas = document.querySelectorAll('#contenedor-canales-dinamicos .card-canal');
            tarjetas.forEach(card => {
                const nombre = card.innerText.toLowerCase();
                card.style.display = nombre.includes(filtro) ? "" : "none";
            });
        }

        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';
        const canalesABorrar = ["alfa & omega vision", "aviva tv", "campus tv", "canal 5 el líder", "canal 7 talanga visión", "canal 32 sto", "cholusat sur 36", "deportes tvc", "cva tv", "edn tv", "girasol tv", "globo tv", "inmaculada tv", "la 98.1 tv", "litoral atlántico", "ltv", "maya tv"];

        async function cargarCanales() {
            try {
                const contenedor = document.getElementById('contenedor-canales-dinamicos');
                const respuesta = await fetch(URL_M3U);
                const texto = await respuesta.text();
                const lineas = texto.split('\n');
                let nombreCanal = '';

                for (let i = 0; i < lineas.length; i++) {
                    const linea = lineas[i].trim();
                    if (linea.startsWith('#EXTINF:')) {
                        nombreCanal = linea.split(',')[1] || 'Canal';
                    } else if (linea.startsWith('http') && nombreCanal) {
                        if (!canalesABorrar.some(b => nombreCanal.toLowerCase().includes(b))) {
                            const card = document.createElement('div');
                            card.className = 'card-canal';
                            card.innerHTML = `<span class="tag-live-premium">LIVE</span><div class="canal-meta">${nombreCanal.substring(0,10)}</div><div class="canal-titulo-texto">${nombreCanal}</div>`;
                            card.onclick = () => {
                                player.src({type: 'application/x-mpegURL', src: linea});
                                player.play();
                                document.querySelectorAll('.card-canal').forEach(c => c.classList.remove('activo'));
                                card.classList.add('activo');
                            };
                            contenedor.appendChild(card);
                        }
                        nombreCanal = '';
                    }
                }
            } catch (e) { console.error(e); }
        }

        function moverCarrusel(dir) { document.getElementById('contenedor-canales-dinamicos').scrollBy({ left: dir === 'izquierda' ? -210 : 210, behavior: 'smooth' }); }
        function navegarVertical(dir) { window.scrollTo({ top: dir === 'arriba' ? 0 : 1000, behavior: 'smooth' }); }
        
        window.onload = cargarCanales;
    </script>
</body>
</html>
