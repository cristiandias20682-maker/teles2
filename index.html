<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV CRISTIAN DIAS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="https://www.gstatic.com/cv/js/sender/v1/cast_sender.js?loadCastFramework=1"></script>
    
    <style>
        body { display: flex; background: #0f0f0f; color: white; margin: 0; font-family: sans-serif; overflow: hidden; }
        .sidebar { width: 220px; background: #1a1a1a; height: 100vh; padding: 20px; border-right: 1px solid #333; }
        .content { flex: 1; padding: 30px; overflow-y: auto; }
        .video-box { width: 100%; max-width: 800px; background: #000; border-radius: 12px; margin-bottom: 20px; aspect-ratio: 16/9; position: relative; }
        video { width: 100%; height: 100%; border-radius: 12px; }
        /* Botón de Cast flotante sobre el video */
        google-cast-launcher { position: absolute; top: 15px; right: 15px; width: 50px; height: 50px; z-index: 10; cursor: pointer; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .canal-card { background: #2a2a2a; padding: 15px; text-align: center; border-radius: 8px; cursor: pointer; border: 1px solid #444; }
        .canal-card:hover { border: 1px solid #007bff; background: #333; }
        .logo { font-weight: bold; margin-bottom: 40px; color: #007bff; font-size: 1.3rem; }
    </style>
</head>
<body>
    <nav class="sidebar">
        <div class="logo">SISTEMA TV<br>CRISTIAN DIAS</div>
        <p>● Inicio</p>
        <p>○ Buscar</p>
        <p>○ Biblioteca</p>
    </nav>
    
    <main class="content">
        <h1>Mi TV Honduras</h1>
        <div class="video-box">
            <google-cast-launcher></google-cast-launcher>
            <video id="video" controls autoplay></video>
        </div>
        <div class="grid" id="lista">Cargando canales...</div>
    </main>

    <script>
        // Configuración de Google Cast
        window['__onGCastApiAvailable'] = function(isAvailable) {
            if (isAvailable) {
                cast.framework.CastContext.getInstance().setOptions({
                    receiverApplicationId: chrome.cast.media.DEFAULT_MEDIA_RECEIVER_APP_ID,
                    autoJoinPolicy: chrome.cast.AutoJoinPolicy.ORIGIN_SCOPED
                });
            }
        };

        const video = document.getElementById('video');
        const lista = document.getElementById('lista');
        const hls = new Hls();

        // Lista de canales actualizada
        const canales = [
            { nombre: "HCH", url: "https://stream.hch.tv/hch/hch.m3u8" },
            { nombre: "Canal 5", url: "https://tv-honduras.com/canal5.m3u8" },
            { nombre: "Telecadena", url: "https://tv-honduras.com/telecadena.m3u8" },
            { nombre: "TSI", url: "https://tv-honduras.com/tsi.m3u8" },
            { nombre: "Mega TV", url: "https://tv-honduras.com/mega.m3u8" },
            { nombre: "Canal 8", url: "https://live.canal8.hn/live.m3u8" }
        ];

        function renderizarCanales() {
            lista.innerHTML = '';
            canales.forEach(c => {
                const btn = document.createElement('div');
                btn.className = 'canal-card';
                btn.innerText = c.nombre;
                btn.onclick = () => {
                    if(Hls.isSupported()) {
                        hls.loadSource(c.url);
                        hls.attachMedia(video);
                        video.play();
                    }
                };
                lista.appendChild(btn);
            });
        }
        renderizarCanales();
    </script>
</body>
</html>
