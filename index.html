<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --glass: rgba(255, 255, 255, 0.08); --accent: #00ff9d; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Interfaz Original Restaurada */
        .glass { background: var(--glass); backdrop-filter: blur(25px); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 20px; }
        .main-layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; flex-grow: 1; min-height: 0; }
        
        .video-box { background: black; border: 2px solid var(--accent); border-radius: 20px; overflow: hidden; display: flex; }
        .video-js { width: 100% !important; height: 100% !important; }

        .shelf { display: flex; gap: 15px; overflow-x: auto; padding: 15px; margin-top: 15px; }
        .channel-card { min-width: 160px; height: 80px; flex-shrink: 0; padding: 10px; cursor: pointer; border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; background: rgba(0,0,0,0.3); font-size: 11px; }
        
        .dock { display: flex; justify-content: center; gap: 40px; margin-top: 15px; padding: 15px; }
        .app-icon { width: 45px; height: 45px; cursor: pointer; transition: 0.3s; }
    </style>
</head>
<body>

    <div class="main-layout">
        <div class="glass" style="padding: 20px;">
            <h3 style="color:var(--accent)">NOTICIAS SULA (SB)</h3>
            <div class="channel-card" style="margin-bottom:10px" onclick="player.src('URL_NOTICIA_1')">Noticias Sula 1</div>
            <div class="channel-card" style="margin-bottom:10px" onclick="player.src('URL_NOTICIA_2')">Noticias Sula 2</div>
            
            <h3 style="color:var(--accent); margin-top:20px;">SEÑALES</h3>
            <div class="channel-card" style="margin-bottom:10px" onclick="window.open('https://www.televicentro.com')">Canal 5 (Oficial)</div>
            <div class="channel-card" style="margin-bottom:10px" onclick="window.open('https://www.deportestvc.com')">Deportes TVC</div>
        </div>
        
        <div class="video-box glass">
            <video id="reproductor" class="video-js vjs-big-play-centered" controls preload="auto"></video>
        </div>
    </div>

    <div id="shelf" class="shelf glass"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor');
        
        // Lista de canales a eliminar definitivamente
        const blockList = ["Alfa & Omega", "Aviva", "Campus", "Girasol", "32 STO", "Cholusat", "Talanga"];

        async function loadChannels() {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = ''; 
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            
            data.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = arr[i + 1];
                    
                    // Filtrar los canales no deseados
                    if (!blockList.some(b => name.includes(b))) {
                        const div = document.createElement('div');
                        div.className = 'channel-card';
                        div.innerHTML = `<b>LIVE</b><br>${name.substring(0, 18)}`;
                        div.onclick = () => { player.src({src: url, type: 'application/x-mpegURL'}); player.play(); };
                        shelf.appendChild(div);
                    }
                }
            });
        }
        loadChannels();
    </script>
</body>
</html>
