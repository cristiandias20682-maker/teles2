<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg-body: #05070a;
            --panel: rgba(26, 30, 38, 0.6);
            --accent: #00ff9d;
            --white: #ffffff;
            --gray: #888;
        }

        body {
            background: var(--bg-body);
            color: var(--white);
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header { display: flex; justify-content: space-between; margin-bottom: 20px; }
        .layout-tv { display: grid; grid-template-columns: 300px 1fr; gap: 20px; height: 60vh; }

        .vidrio {
            background: var(--panel);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 15px;
            padding: 15px;
        }

        /* Reproductor Corregido: Ocupa el espacio completo del contenedor */
        .contenedor-reproductor {
            background: #000;
            border-radius: 20px;
            border: 2px solid var(--accent);
            width: 100%;
            height: 100%;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .video-js { width: 100% !important; height: 100% !important; }

        .carrusel-nacionales {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            margin-top: 20px;
            padding-bottom: 10px;
        }

        .card-canal {
            min-width: 180px;
            height: 100px;
            flex-shrink: 0;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            font-size: 12px;
        }

        .card-canal.seleccionado { border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-weight: 800; font-size: 20px;">SISTEMA DE CANALES - CRISTIAN DIAS</div>
        <div id="reloj">00:00:00</div>
    </header>

    <div class="layout-tv">
        <div class="vidrio">
            <div style="color:var(--accent); margin-bottom:10px;">🏆 SEÑALES</div>
            <div class="vidrio" style="margin-bottom:10px;" onclick="window.open('https://www.televicentro.com', '_blank')">Canal 5 (Oficial)</div>
            <div class="vidrio" onclick="window.open('https://www.deportestvc.com', '_blank')">Deportes TVC</div>
        </div>
        <div class="contenedor-reproductor">
            <video id="reproductor" class="video-js vjs-default-skin" controls></video>
        </div>
    </div>

    <div style="color:var(--accent); margin-top:20px;">🌐 CANALES NACIONALES (TOTAL: 100+)</div>
    <div class="carrusel-nacionales" id="lista"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor', { autoplay: true });
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);

        async function cargar() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const container = document.getElementById('lista');
            const lines = data.split('\n');

            for(let i=0; i<lines.length; i++) {
                if(lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    if(name && url) {
                        const div = document.createElement('div');
                        div.className = 'vidrio card-canal';
                        div.innerHTML = `<span style="color:red; font-size:9px;">LIVE</span><div>${name}</div>`;
                        div.onclick = () => {
                            player.src({src: url, type: 'application/x-mpegURL'});
                            player.play();
                            document.querySelectorAll('.card-canal').forEach(c => c.classList.remove('seleccionado'));
                            div.classList.add('activo');
                        };
                        container.appendChild(div);
                    }
                }
            }
        }
        cargar();
    </script>
</body>
</html>
