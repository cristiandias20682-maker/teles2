<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV CRISTIAN DIAS</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body { background: #0f0f0f; color: white; font-family: sans-serif; margin: 0; display: flex; }
        .sidebar { width: 200px; padding: 20px; background: #1a1a1a; height: 100vh; }
        .content { flex: 1; padding: 20px; }
        #video { width: 100%; max-width: 700px; background: #000; border-radius: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .canal { background: #333; padding: 10px; border-radius: 5px; cursor: pointer; text-align: center; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="sidebar"><h3>SISTEMA TV CRISTIAN DIAS</h3></div>
    <div class="content">
        <video id="video" controls></video>
        <div class="grid" id="lista"></div>
    </div>
    <script>
        const video = document.getElementById('video');
        const lista = document.getElementById('lista');
        const hls = new Hls();

        // Lista de canales base
        const canales = [
            {n: "HCH", u: "https://stream.hch.tv/hch/hch.m3u8"},
            {n: "Canal 5", u: "https://tv-honduras.com/canal5.m3u8"},
            {n: "TSI", u: "https://tv-honduras.com/tsi.m3u8"},
            {n: "Canal 8", u: "https://live.canal8.hn/live.m3u8"}
            // ... (Agrega más aquí siguiendo el mismo formato)
        ];

        canales.forEach(c => {
            const div = document.createElement('div');
            div.className = 'canal';
            div.innerText = c.n;
            div.onclick = () => {
                hls.loadSource(c.u);
                hls.attachMedia(video);
                video.play();
            };
            lista.appendChild(div);
        });
    </script>
</body>
</html>
