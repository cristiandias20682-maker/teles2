<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: 1px solid rgba(255, 255, 255, 0.1);
            --accent: #00ff9d;
        }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Efecto Liquid Glass Global */
        .glass { background: var(--glass); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: var(--glass-border); border-radius: 20px; }

        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; flex-grow: 1; min-height: 0; }
        
        .video-wrapper { background: black; border: 2px solid var(--accent); border-radius: 20px; overflow: hidden; display: flex; }
        .video-js { width: 100% !important; height: 100% !important; }

        .shelf { display: flex; gap: 15px; overflow-x: auto; padding: 15px; margin-top: 15px; }
        .channel-card { min-width: 160px; height: 80px; flex-shrink: 0; padding: 10px; cursor: pointer; border: var(--glass-border); border-radius: 12px; font-size: 11px; background: rgba(0,0,0,0.2); transition: 0.3s; }
        .channel-card:hover { border-color: var(--accent); background: rgba(0, 255, 157, 0.05); }

        .dock { display: flex; justify-content: center; gap: 30px; margin-top: 15px; padding: 15px 40px; }
        .app-btn { width: 50px; height: 50px; border-radius: 15px; display: flex; align-items: center; justify-content: center; font-weight: bold; cursor: pointer; border: var(--glass-border); background: rgba(255,255,255,0.05); transition: 0.3s; }
        .app-btn:hover { transform: scale(1.1); border-color: var(--accent); }
    </style>
</head>
<body>

    <div class="layout">
        <div class="glass" style="padding: 20px;">
            <h3 style="color:var(--accent)">🏆 SEÑALES</h3>
            <div class="channel-card" onclick="window.open('https://www.televicentro.com')">Canal 5 (Oficial)</div>
            <div class="channel-card" onclick="window.open('https://www.deportestvc.com')">Deportes TVC</div>
            <div style="margin-top: 20px; display: flex; gap: 10px;">
                <button onclick="document.getElementById('shelf').scrollBy(-300,0)" class="channel-card" style="width: 50%">◀ IZQ</button>
                <button onclick="document.getElementById('shelf').scrollBy(300,0)" class="channel-card" style="width: 50%">DER ▶</button>
            </div>
        </div>
        <div class="video-wrapper">
            <video id="reproductor" class="video-js" controls preload="auto"></video>
        </div>
    </div>

    <div id="shelf" class="shelf glass"></div>

    <div class="dock glass">
        <div class="app-btn" onclick="window.open('https://youtube.com')">YT</div>
        <div class="app-btn" onclick="window.open('https://netflix.com')">NF</div>
        <div class="app-btn" onclick="window.open('https://primevideo.com')">PRIME</div>
        <div class="app-btn" onclick="window.open('https://disneyplus.com')">DISNEY</div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor', { autoplay: true });
        async function loadChannels() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const shelf = document.getElementById('shelf');
            data.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = arr[i + 1];
                    const div = document.createElement('div');
                    div.className = 'channel-card';
                    div.innerHTML = `<span style="color:red">LIVE</span><br>${name.substring(0, 20)}`;
                    div.onclick = () => { player.src({src: url, type: 'application/x-mpegURL'}); player.play(); };
                    shelf.appendChild(div);
                }
            });
        }
        loadChannels();
    </script>
</body>
</html>
