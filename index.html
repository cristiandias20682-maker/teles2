<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.06);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --accent: #00ff9d;
        }

        body { 
            background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; 
            margin: 0; padding: 20px; height: 100vh; overflow: hidden;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }

        /* Efecto Liquid Glass Real */
        .liquid-glass {
            background: var(--glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: var(--glass-border);
            border-radius: 25px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.5);
        }

        .main-container {
            width: 90%;
            height: 75vh;
            display: grid;
            grid-template-columns: 1fr 2.5fr;
            gap: 20px;
        }

        .video-box {
            background: black;
            border: 2px solid var(--accent);
            border-radius: 25px;
            overflow: hidden;
        }

        /* Dock de Apps Liquid Glass */
        .dock {
            margin-top: 20px;
            padding: 15px 40px;
            display: flex;
            gap: 40px;
        }

        .app-icon {
            width: 55px;
            height: 55px;
            cursor: pointer;
            transition: transform 0.3s;
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
        }

        .app-icon:hover { transform: scale(1.2); }
    </style>
</head>
<body>

    <div class="main-container">
        <div class="liquid-glass" style="padding: 20px;">
            <h2 style="color:var(--accent)">CRISTIAN DIAS</h2>
            <p>Bienvenido al sistema.</p>
        </div>

        <div class="video-box liquid-glass">
            <video id="reproductor" class="video-js" controls width="100%" height="100%"></video>
        </div>
    </div>

    <div class="dock liquid-glass">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" onclick="window.open('https://youtube.com')">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" onclick="window.open('https://netflix.com')">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/1/11/Amazon_Prime_Video_logo.svg" onclick="window.open('https://primevideo.com')">
        <img class="app-icon" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" onclick="window.open('https://disneyplus.com')">
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        // Inicializar reproductor
        videojs('reproductor');
    </script>
</body>
</html>
