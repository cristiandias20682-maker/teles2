<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Liquid IPTV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        /* PANTALLA DE BIENVENIDA */
        #pantalla-bienvenida { position: fixed; inset: 0; z-index: 999999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #video-intro { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.5; }
        .btn-bienvenida { position: relative; z-index: 2; padding: 25px 60px; font-size: 20px; cursor: pointer; background: rgba(255, 255, 255, 0.1); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); color: #fff; border-radius: 50px; font-weight: 800; animation: pulso 2s infinite; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes pulso { 0% { transform: scale(1); box-shadow: 0 0 0px rgba(255,255,255,0.2); } 50% { transform: scale(1.05); box-shadow: 0 0 20px rgba(0, 255, 157, 0.4); } 100% { transform: scale(1); } }
        #contenedor-sistema { display: none; }

        :root { --bg-gradiente: radial-gradient(circle at 50% 30%, #0a111e 0%, #05070b 100%); --liquid-bg: linear-gradient(135deg, rgba(25, 36, 56, 0.45) 0%, rgba(13, 19, 31, 0.7) 100%); --liquid-bg-hover: linear-gradient(135deg, rgba(35, 52, 82, 0.6) 0%, rgba(18, 27, 46, 0.85) 100%); --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.15); --neon-verde: 0 0 25px rgba(0, 255, 157, 0.6); --text-main: #f7fafc; --text-sub: #90cdf4; }
        body { background: var(--bg-gradiente); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; min-height: 100vh; }
        #control-vertical-tv { position: fixed; left: 15px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 10px; z-index: 10000; background: rgba(10, 15, 24, 0.6); padding: 8px; border-radius: 20px; }
        .btn-control-total { background: rgba(30, 41, 59, 0.8); border: 1px solid rgba(255, 255, 255, 0.1); color: white; width: 38px; height: 38px; border-radius: 50%; cursor: pointer; }
        .contenido-principal { padding-left: 80px; padding-right: 20px; }
        .titulo-marca { font-size: 20px; font-weight: 800; text-transform: uppercase; margin: 20px 0; }
        #contenedor-reproductor { width: 100%; max-width: 1100px; background: #000; border-radius: 24px; overflow: hidden; border: 2px solid rgba(255, 255, 255, 0.08); }
        .seccion-interfaz { padding: 10px 0; }
        .titulo-fila { font-size: 13px; font-weight: 700; text-transform: uppercase; margin-bottom: 12px; color: #cbd5e0; }
        .grid-cuadros { display: flex; gap: 15px; overflow-x: auto; padding: 5px 0; }
        .card-canal { background: var(--liquid-bg); border-radius: 18px; padding: 15px; width: 190px; flex-shrink: 0; cursor: pointer; border: 1px solid rgba(255, 255, 255, 0.1); }
        .card-canal:hover { background: var(--liquid-bg-hover); border-color: #00ff9d; }
        .canal-titulo-texto { font-size: 13px; font-weight: 600; }
        .tag-live-premium { background: #ff4b4b; font-size: 8px; padding: 2px 6px; border-radius: 5px; }
        #dock-apps { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: rgba(10, 15, 24, 0.95); padding: 10px 20px; border-radius: 25px; display: flex; gap: 15px; z-index: 9999; }
        .app-icono { width: 38px; height: 38px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
    </style>
</head>
<body>

    <div id="pantalla-bienvenida">
        <video id="video-intro" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-abstract-flowing-curved-lines-gradient-background-27763-large.mp4" type="video/mp4">
        </video>
        <button class="btn-bienvenida" onclick="iniciarApp()">BIENVENIDOS: PRESIONA CONTINUAR PARA EMPEZAR A VER</button>
    </div>

    <div id="contenedor-sistema">
        <div id="control-vertical-tv">
            <button class="btn-control-total" onclick="window.scrollTo(0,0)">▲</button>
            <button class="btn-control-total" onclick="document.getElementById('sec-nacionales').scrollIntoView()">▼</button>
        </div>
        <div class="contenido-principal">
            <h1 class="titulo-marca">SISTEMA DE CANALES</h1>
            <div id="contenedor-reproductor">
                <video id="reproductor-tv" class="video-js vjs-default-skin vjs-big-play-centered" controls preload="auto" width="100%"></video>
            </div>
            <div class="seccion-interfaz" id="sec-exclusivas">
                <div class="titulo-fila">🏆 SEÑALES EXCLUSIVAS</div>
                <div class="grid-cuadros">
                    <div class="card-canal" onclick="window.open('https://www.televicentro.com', '_blank')">
                        <span class="tag-live-premium">WEB</span>
                        <div class="canal-titulo-texto">CANAL 5</div>
                    </div>
                </div>
            </div>
            <div class="seccion-interfaz" id="sec-nacionales">
                <div class="titulo-fila">🌐 CANALES NACIONALES</div>
                <div class="grid-cuadros" id="contenedor-canales-dinamicos"></div>
            </div>
        </div>
        <div id="dock-apps">
            <div class="app-icono" style="background: #ff0000;" onclick="window.open('https://www.youtube.com', '_blank')">YT</div>
            <div class="app-icono" style="background: #e50914;" onclick="window.open('https://www.netflix.com', '_blank')">N</div>
        </div>
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor-tv', { fluid: true });
        function iniciarApp() {
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('contenedor-sistema').style.display = 'block';
            cargarCanales();
        }
        async function cargarCanales() {
            const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';
            const respuesta = await fetch(URL_M3U);
            const texto = await respuesta.text();
            const lineas = texto.split('\n');
            const contenedor = document.getElementById('contenedor-canales-dinamicos');
            let nombreCanal = '';
            for (let i = 0; i < lineas.length; i++) {
                if (lineas[i].startsWith('#EXTINF:')) {
                    nombreCanal = lineas[i].split(',')[1];
                } else if (lineas[i].startsWith('http') && nombreCanal) {
                    const card = document.createElement('div');
                    card.className = 'card-canal';
                    card.innerHTML = `<div class="canal-titulo-texto">${nombreCanal}</div>`;
                    const url = lineas[i];
                    card.onclick = () => { player.src({type: 'application/x-mpegURL', src: url}); player.play(); };
                    contenedor.appendChild(card);
                    nombreCanal = '';
                }
            }
        }
    </script>
</body>
</html>
