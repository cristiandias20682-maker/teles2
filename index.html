<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA DE CANALES - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root { --bg: #05070a; --panel: #1a1e26; --accent: #00ff9d; --gray: #888; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; padding: 30px; overflow: hidden; }
        
        .header { display: flex; justify-content: space-between; margin-bottom: 30px; }
        /* Layout de la foto: Izquierda señales, Derecha reproductor */
        .main-layout { display: grid; grid-template-columns: 350px 1fr; gap: 30px; }
        
        .video-container { background: #000; border-radius: 20px; border: 2px solid var(--accent); height: 400px; width: 100%; }
        .side-panel { display: flex; flex-direction: column; gap: 15px; }
        .card { background: var(--panel); border-radius: 12px; padding: 20px; cursor: pointer; border: 1px solid #333; }
        .card:hover { border-color: var(--accent); }
        
        /* Carrusel inferior de la foto */
        .carousel-bottom { display: flex; gap: 15px; margin-top: 30px; overflow-x: auto; padding-bottom: 10px; }
        .channel-card { min-width: 200px; height: 100px; background: var(--panel); border-radius: 15px; padding: 15px; cursor: pointer; border: 1px solid #333; }
        .channel-card.activo { border: 2px solid var(--accent); }
    </style>
</head>
<body>

    <header class="header">
        <div style="font-size: 24px; font-weight: bold;">SISTEMA DE CANALES - CRISTIAN DIAS</div>
        <div id="reloj" style="font-size: 20px; color: var(--gray);">00:00:00</div>
    </header>

    <div class="main-layout">
        <div class="side-panel">
            <div style="color: var(--accent);">🏆 SEÑALES EXCLUSIVAS (MUNDIAL)</div>
            <div class="card" onclick="window.open('https://www.televicentro.com', '_blank')">Canal 5 (Oficial)</div>
            <div class="card" onclick="window.open('https://www.deportestvc.com', '_blank')">Deportes TVC</div>
        </div>

        <div class="video-container">
            <video id="player" class="video-js vjs-default-skin" controls width="100%" height="400px"></video>
        </div>
    </div>

    <div style="margin-top: 30px; color: var(--accent);">🌐 CANALES NACIONALES</div>
    <div class="carousel-bottom" id="lista-canales"></div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('player', { autoplay: true, html5: { hls: { overrideNative: true } } });
        
        setInterval(() => document.getElementById('reloj').innerText = new Date().toLocaleTimeString(), 1000);

        const URL_M3U = 'https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u';
        const ignorar = ["alfa & omega vision", "aviva tv", "campus tv", "canal 5 el líder", "canal 7 talanga visión", "canal 32 sto", "cholusat sur 36", "deportes tvc", "cva tv", "edn tv", "girasol tv", "globo tv", "inmaculada tv", "la 98.1 tv", "litoral atlántico", "ltv", "maya tv"];

        async function cargar() {
            const res = await fetch(URL_M3U);
            const data = await res.text();
            const container = document.getElementById('lista-canales');
            const lines = data.split('\n');

            for(let i=0; i<lines.length; i++) {
                if(lines[i].startsWith('#EXTINF:')) {
                    const name = lines[i].split(',')[1];
                    const url = lines[i+1];
                    if(name && url && !ignorar.some(b => name.toLowerCase().includes(b))) {
                        const div = document.createElement('div');
                        div.className = 'channel-card';
                        div.innerHTML = `<div style="font-size: 10px; color:red">LIVE</div><div>${name.substring(0,20)}</div>`;
                        div.onclick = () => { 
                            player.src({src: url, type: 'application/x-mpegURL'}); 
                            player.play();
                            document.querySelectorAll('.channel-card').forEach(c => c.classList.remove('activo'));
                            div.classList.add('activo');
                        };
                        container.appendChild(div);
                    }
                }
            }
        }
        cargar();
    </script>
</body>
</html>
