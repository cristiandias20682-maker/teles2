<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Liquid IPTV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        /* PANTALLA DE BIENVENIDA ESTILO TÉCNICO */
        #pantalla-bienvenida { position: fixed; inset: 0; z-index: 999999; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        
        /* Video de estilo terminal de datos */
        #video-intro { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; filter: hue-rotate(150deg) contrast(1.2); }
        
        .btn-bienvenida { 
            position: relative; z-index: 2; padding: 25px 50px; font-size: 20px; cursor: pointer; 
            background: transparent; border: 2px solid #00ff9d; color: #00ff9d;
            border-radius: 10px; font-weight: 700; letter-spacing: 2px;
            text-transform: uppercase; transition: 0.3s;
            box-shadow: 0 0 15px rgba(0, 255, 157, 0.2);
        }
        .btn-bienvenida:hover { background: #00ff9d; color: #000; box-shadow: 0 0 30px #00ff9d; }
        
        #contenedor-sistema { display: none; }

        /* ... El resto de tu CSS original sigue igual ... */
        :root {
            --bg-gradiente: radial-gradient(circle at 50% 30%, #0a111e 0%, #05070b 100%);
            --liquid-bg: linear-gradient(135deg, rgba(25, 36, 56, 0.45) 0%, rgba(13, 19, 31, 0.7) 100%);
            --liquid-bg-hover: linear-gradient(135deg, rgba(35, 52, 82, 0.6) 0%, rgba(18, 27, 46, 0.85) 100%);
            --glass-shadow: 0 15px 35px rgba(0, 0, 0, 0.6), inset 0 1px 2px rgba(255, 255, 255, 0.15);
            --neon-cyan: 0 0 20px rgba(0, 191, 255, 0.4);
            --neon-verde: 0 0 25px rgba(0, 255, 157, 0.6);
            --text-main: #f7fafc;
            --text-sub: #90cdf4;
        }

        body { background: var(--bg-gradiente); color: var(--text-main); font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; min-height: 100vh; }
        /* (Aquí iría el resto de tu CSS original que ya tenías) */
    </style>
</head>
<body>

    <div id="pantalla-bienvenida">
        <video id="video-intro" autoplay muted loop playsinline>
            <source src="https://assets.mixkit.co/videos/preview/mixkit-digital-binary-code-in-motion-1250-large.mp4" type="video/mp4">
        </video>
        <button class="btn-bienvenida" onclick="iniciarApp()">BIENVENIDOS: PRESIONA CONTINUAR PARA EMPEZAR A VER</button>
    </div>

    <div id="contenedor-sistema">
        </div>

    <script>
        function iniciarApp() {
            document.getElementById('pantalla-bienvenida').style.display = 'none';
            document.getElementById('contenedor-sistema').style.display = 'block';
            // Si tenías una función de carga, se llama aquí
            if(typeof cargarCanales === 'function') cargarCanales();
        }
    </script>
</body>
</html>
