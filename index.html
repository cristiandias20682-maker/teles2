<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>SISTEMA TV - CRISTIAN DIAS</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <style>
        :root {
            --bg: #05070a;
            --glass: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
            --accent: #00ff9d;
        }

        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* Efecto Liquid Glass */
        .glass { background: var(--glass); backdrop-filter: blur(20px); border: var(--glass-border); border-radius: 20px; }

        .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; flex-grow: 1; }
        
        .video-wrapper { background: black; border: 2px solid var(--accent); border-radius: 20px; overflow: hidden; display: flex; }
        .video-js { width: 100% !important; height: 100% !important; }

        /* Botones laterales pequeños */
        .btn-side { width: 60px; height: 35px; border-radius: 8px; border: var(--glass-border); background: var(--glass); cursor: pointer; color: white; font-size: 10px; font-weight: bold; }
        .btn-side:hover { background: var(--accent); color: black; }

        .shelf { display: flex; gap: 15px; overflow-x: auto; padding: 15px; margin-top: 15px; }
        .channel-card { min-width: 160px; height: 80px; flex-shrink: 0; padding: 10px; cursor: pointer; border: var(--glass-border); border-radius: 12px; font-size: 11px; background: rgba(0,0,0,0.2); }

        /* Dock con Logos */
        .dock { display: flex; justify-content: center; gap: 20px; margin-top: 15px; padding: 10px; }
        .app-logo { width: 50px; height: 50px; cursor: pointer; transition: 0.3s; filter: drop-shadow(0 0 5px rgba(0,0,0,0.5)); }
        .app-logo:hover { transform: scale(1.15); }
    </style>
</head>
<body>

    <div class="layout">
        <div class="glass" style="padding: 20px;">
            <h3 style="color:var(--accent); font-size: 14px;">🏆 SEÑALES</h3>
            <div class="channel-card" style="height: auto; margin-bottom: 10px;" onclick="window.open('https://www.televicentro.com')">Canal 5 (Oficial)</div>
            <div class="channel-card" style="height: auto; margin-bottom: 10px;" onclick="window.open('https://www.deportestvc.com')">Deportes TVC</div>
            
            <div style="display: flex; gap: 10px; margin-top: 10px;">
                <button onclick="document.getElementById('shelf').scrollBy(-300,0)" class="btn-side">◀ IZQ</button>
                <button onclick="document.getElementById('shelf').scrollBy(300,0)" class="btn-side">DER ▶</button>
            </div>
        </div>
        <div class="video-wrapper">
            <video id="reproductor" class="video-js" controls preload="auto"></video>
        </div>
    </div>

    <div id="shelf" class="shelf glass"></div>

    <div class="dock glass">
        <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/09/YouTube_full-color_icon_%282017%29.svg" onclick="window.open('https://youtube.com')">
        <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/0/08/Netflix_2015_logo.svg" onclick="window.open('https://netflix.com')">
        <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/1/11/Amazon_Prime_Video_logo.svg" onclick="window.open('https://primevideo.com')">
        <img class="app-logo" src="https://upload.wikimedia.org/wikipedia/commons/3/3e/Disney%2B_logo.svg" onclick="window.open('https://disneyplus.com')">
    </div>

    <script src="https://vjs.zencdn.net/7.20.3/video.js"></script>
    <script>
        const player = videojs('reproductor', { autoplay: true });
        async function load() {
            const res = await fetch('https://raw.githubusercontent.com/iptv-org/iptv/master/streams/hn.m3u');
            const data = await res.text();
            const shelf = document.getElementById('shelf');
            data.split('\n').forEach((line, i, arr) => {
                if (line.startsWith('#EXTINF:')) {
                    const name = line.split(',')[1];
                    const url = arr[i + 1];
                    const div = document.createElement('div');
                    div.className = 'channel-card';
                    div.innerHTML = `<span style="color:red; font-size:9px;">LIVE</span><br>${name.substring(0, 18)}`;
                    div.onclick = () => { player.src({src: url, type: 'application/x-mpegURL'}); player.play(); };
                    shelf.appendChild(div);
                }
            });
        }
        load();
    </script>
</body>
</html>
